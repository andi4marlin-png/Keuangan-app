<script>
// --- KONFIGURASI SUPABASE ---
// Pastikan URL sudah tanpa /rest/v1/ dan Anon Key sudah diisi dengan benar
const SUPABASE_URL = 'https://uordvgtdkouqhyxaidjo.supabase.co'; 
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvcmR2Z3Rka291cWh5eGFpZGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzgzMTgsImV4cCI6MjA5OTAxNDMxOH0.7is6vPTnbTge42w-8JKq62z5f42_km5EOKx-IcSyltI​';

// Inisialisasi koneksi ke Supabase
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('tanggal').valueAsDate = new Date();

let dataTransaksi = [];
let dataRamalanMasuk = [];
let dataRamalanKeluar = [];

function keRupiah(angka) {
    return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

// Fungsi Mengambil Data Keseluruhan dari Cloud Supabase
async function muatDataDariDatabase() {
    try {
        const resTransaksi = await _supabase.from('transaksi').select('*').order('id', { ascending: false });
        const resRamalanMasuk = await _supabase.from('ramalan_masuk').select('*').order('id', { ascending: false });
        const resRamalanKeluar = await _supabase.from('ramalan_keluar').select('*').order('id', { ascending: false });

        if (resTransaksi.error) console.error("Error Transaksi:", resTransaksi.error.message);
        if (resRamalanMasuk.error) console.error("Error Rencana Masuk:", resRamalanMasuk.error.message);
        if (resRamalanKeluar.error) console.error("Error Rencana Keluar:", resRamalanKeluar.error.message);

        dataTransaksi = resTransaksi.data || [];
        dataRamalanMasuk = resRamalanMasuk.data || [];
        dataRamalanKeluar = resRamalanKeluar.data || [];

        perbaruiTampilanLayar();
    } catch (err) {
        console.error("Gagal memuat data:", err);
        document.getElementById('daftarIsi').innerHTML = '<p style="color:red; text-align:center;">Gagal terhubung ke database.</p>';
    }
}

// Mengolah angka dan memperbarui antarmuka pengguna
function perbaruiTampilanLayar() {
    let totalM = 0, totalK = 0, totalRM = 0, totalRK = 0, tampilHTML = '';
    
    dataRamalanMasuk.forEach((item) => {
        totalRM += parseFloat(item.nilai);
        tampilHTML += `
        <div class="item">
            <div class="detail-item">
                <div>📅 <strong style="color: #166534;">[Rencana Masuk]</strong> ${item.ket}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="jumlah-masuk">+${keRupiah(item.nilai)}</span>
                <button class="merah" onclick="hapusData('ramalan_masuk', ${item.id})">×</button>
            </div>
        </div>`;
    });

    dataRamalanKeluar.forEach((item) => {
        totalRK += parseFloat(item.nilai);
        tampilHTML += `
        <div class="item">
            <div class="detail-item">
                <div>📅 <strong style="color: #991b1b;">[Rencana Biaya]</strong> ${item.ket}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="jumlah-ramal">-${keRupiah(item.nilai)}</span>
                <button class="merah" onclick="hapusData('ramalan_keluar', ${item.id})">×</button>
            </div>
        </div>`;
    });

    dataTransaksi.forEach((item) => {
        if (item.jenis === 'masuk') totalM += parseFloat(item.nilai);
        else totalK += parseFloat(item.nilai);
        
        let teksKategori = item.keterangan ? `${item.kategori} - ${item.keterangan}` : item.kategori;
        
        tampilHTML += `
        <div class="item">
            <div class="detail-item">
                <div>${teksKategori}</div>
                <div class="tanggal-badge">${item.tanggal}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="${item.jenis === 'masuk' ? 'jumlah-masuk' : 'jumlah-keluar'}">
                    ${item.jenis === 'masuk' ? '+' : '-'}${keRupiah(item.nilai)}
                </span>
                <button class="merah" onclick="hapusData('transaksi', ${item.id})">×</button>
            </div>
        </div>`;
    });

    let saldoSekarang = totalM - totalK;
    let estimasiNanti = saldoSekarang + totalRM - totalRK;

    document.getElementById('saldoUtama').textContent = keRupiah(saldoSekarang);
    document.getElementById('totalMasuk').textContent = keRupiah(totalM);
    document.getElementById('totalKeluar').textContent = keRupiah(totalK);
    document.getElementById('sisaNanti').textContent = keRupiah(estimasiNanti);
    
    document.getElementById('sisaNanti').style.color = (estimasiNanti < 0) ? '#ef4444' : '#1e40af';
    document.getElementById('daftarIsi').innerHTML = tampilHTML || '<p style="color:#888;text-align:center;padding:15px;">Belum ada data transaksi atau rencana</p>';
}

// Fungsi Tambah Transaksi Real ke Supabase dengan Detektor Error
async function tambahTransaksi() {
    const jenis = document.getElementById('jenis').value;
    const kategori = document.getElementById('kategori').value;
    const keterangan = document.getElementById('keterangan').value.trim();
    const nilai = parseInt(document.getElementById('jumlah').value);
    const tanggal = document.getElementById('tanggal').value;

    if (!kategori || !nilai || nilai <= 0) { 
        alert('Pilih kategori dan isi jumlah uang dengan benar!'); 
        return; 
    }

    document.getElementById('btnTransaksi').disabled = true;
    
    // Menangkap respon error dari Supabase
    const { error } = await _supabase.from('transaksi').insert([{ jenis, kategori, keterangan, nilai, tanggal }]);
    
    document.getElementById('btnTransaksi').disabled = false;

    if (error) {
        // MEMUNCULKAN PESAN ERROR JIKA GAGAL
        alert('GAGAL SIMPAN: ' + error.message);
    } else {
        alert('Berhasil disimpan ke Database!');
        document.getElementById('kategori').value = '';
        document.getElementById('keterangan').value = '';
        document.getElementById('jumlah').value = '';
        muatDataDariDatabase();
    }
}

// Fungsi Tambah Rencana Pemasukan dengan Detektor Error
async function tambahRamalanMasuk() {
    const ket = document.getElementById('ketPemasukanNanti').value.trim();
    const nilai = parseInt(document.getElementById('jmlPemasukanNanti').value);

    if (!ket || !nilai || nilai <= 0) { 
        alert('Isi data dengan benar!'); 
        return; 
    }

    document.getElementById('btnRamalanMasuk').disabled = true;
    const { error } = await _supabase.from('ramalan_masuk').insert([{ ket, nilai }]);
    document.getElementById('btnRamalanMasuk').disabled = false;

    if (error) {
        alert('GAGAL SIMPAN RENCANA MASUK: ' + error.message);
    } else {
        alert('Rencana Pemasukan Berhasil disimpan!');
        document.getElementById('ketPemasukanNanti').value = '';
        document.getElementById('jmlPemasukanNanti').value = '';
        muatDataDariDatabase();
    }
}

// Fungsi Tambah Rencana Pengeluaran dengan Detektor Error
async function tambahRamalanKeluar() {
    const ket = document.getElementById('ketBiaya').value.trim();
    const nilai = parseInt(document.getElementById('jmlBiaya').value);

    if (!ket || !nilai || nilai <= 0) { 
        alert('Isi data dengan benar!'); 
        return; 
    }

    document.getElementById('btnRamalanKeluar').disabled = true;
    const { error } = await _supabase.from('ramalan_keluar').insert([{ ket, nilai }]);
    document.getElementById('btnRamalanKeluar').disabled = false;

    if (error) {
        alert('GAGAL SIMPAN RENCANA BIAYA: ' + error.message);
    } else {
        alert('Rencana Biaya Berhasil disimpan!');
        document.getElementById('ketBiaya').value = '';
        document.getElementById('jmlBiaya').value = '';
        muatDataDariDatabase();
    }
}

// Fungsi Hapus Data Langsung Dari Baris Database
async function hapusData(namaTabel, id) {
    if (confirm('Yakin ingin menghapus data ini dari cloud database?')) {
        const { error } = await _supabase.from(namaTabel).delete().eq('id', id);
        if (error) {
            alert('Gagal menghapus: ' + error.message);
        } else {
            muatDataDariDatabase();
        }
    }
}

// Menjalankan fungsi penarikan data pertama kali saat web dibuka
muatDataDariDatabase();
</script>
